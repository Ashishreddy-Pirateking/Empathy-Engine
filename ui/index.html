<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Empathy Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0f172a, #1e1b4b);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-grad);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            margin-top: 0;
            font-weight: 600;
            font-size: 2rem;
            text-align: center;
            background: -webkit-linear-gradient(#c4b5fd, #8b5cf6);
            background: linear-gradient(to bottom, #c4b5fd, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-weight: 300;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        .output-section {
            margin-top: 30px;
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .info-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }
        
        .stat-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .stat-label {
            color: var(--text-muted);
            font-weight: 300;
        }

        .stat-value {
            font-weight: 600;
            color: #c4b5fd;
        }
        
        /* Modern audio player override */
        audio {
            width: 100%;
            height: 40px;
            border-radius: 20px;
            outline: none;
        }
        
        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: var(--primary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>The Empathy Engine</h1>
        <p class="subtitle">Giving AI a Human Voice</p>

        <textarea id="textInput" placeholder="Type something here... Try 'I am so incredibly happy today!' or 'This is genuinely the worst experience of my life.'"></textarea>
        
        <button id="generateBtn">Synthesize Voice</button>

        <div id="loading" class="loader">Analyzing emotion and synthesizing speech...</div>

        <div id="outputSection" class="output-section">
            <div class="info-card">
                <div class="stat-row">
                    <span class="stat-label">Emotion Detected</span>
                    <span id="outEmotion" class="stat-value">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Intensity</span>
                    <span id="outIntensity" class="stat-value">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Applied Rate Shift</span>
                    <span id="outRate" class="stat-value">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Applied Vol Shift</span>
                    <span id="outVolume" class="stat-value">-</span>
                </div>
            </div>

            <audio id="audioPlayer" controls></audio>
        </div>
    </div>

    <script>
        const btn = document.getElementById('generateBtn');
        const input = document.getElementById('textInput');
        const loading = document.getElementById('loading');
        const outputSection = document.getElementById('outputSection');
        
        const outEmotion = document.getElementById('outEmotion');
        const outIntensity = document.getElementById('outIntensity');
        const outRate = document.getElementById('outRate');
        const outVolume = document.getElementById('outVolume');
        const audioPlayer = document.getElementById('audioPlayer');

        btn.addEventListener('click', async () => {
            const text = input.value.trim();
            if (!text) return;

            // Reset UI
            btn.disabled = true;
            loading.style.display = 'block';
            outputSection.style.display = 'none';

            try {
                const response = await fetch('/api/synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    throw new Error("Failed to synthesize audio");
                }

                const data = await response.json();
                
                // Populate UI
                outEmotion.innerText = data.emotion + " (" + data.mode + " mode)";
                outIntensity.innerText = parseFloat(data.intensity).toFixed(2);
                outRate.innerText = data.parameters_used.rate_shift > 0 ? "+" + data.parameters_used.rate_shift : data.parameters_used.rate_shift;
                outVolume.innerText = data.parameters_used.volume_shift > 0 ? "+" + parseFloat(data.parameters_used.volume_shift).toFixed(2) : parseFloat(data.parameters_used.volume_shift).toFixed(2);
                
                // Set audio source cache-busted
                let audioFilename = data.audio_path.replace(/\\/g, '/').split('/').pop();
                audioPlayer.src = "/audio/" + audioFilename + "?t=" + new Date().getTime();
                
                outputSection.style.display = 'block';
                audioPlayer.play();
                
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
